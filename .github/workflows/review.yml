name: AI Review

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout full repo (IMPORTANT for git diff)
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ✅ Step 2: Setup Python properly
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ✅ Step 3: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ Step 4: Run AI Reviewer
      - name: Run AI DevOps Reviewer
        run: python app/reviewer.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
